<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Meta Tags for SEO and Social Sharing -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Uncle Shawaza - Software Engineer specializing in full-stack development, scalable architectures, and clean code. Explore projects, contributions, and technical expertise.">
    <meta name="keywords" content="software engineer, web developer, full-stack, GitHub, portfolio, uncle-shawaza, developer, programming, open source">
    <meta name="author" content="Uncle Shawaza">
    <meta name="robots" content="index, follow">
    
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://uncle-shawaza.github.io/">
    <meta property="og:title" content="Uncle Shawaza | Software Engineer">
    <meta property="og:description" content="Professional portfolio of Uncle Shawaza - Software Engineer specializing in full-stack development.">
    <meta property="og:image" content="https://uncle-shawaza.github.io/icon.png">
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Uncle Shawaza | Software Engineer">
    <meta name="twitter:description" content="Professional portfolio of Uncle Shawaza - Software Engineer">
    <meta name="twitter:image" content="https://uncle-shawaza.github.io/icon.png">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="canonical" href="https://uncle-shawaza.github.io/">
    
    <title>Uncle Shawaza | Software Engineer</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Google Fonts - Multiple Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Poppins:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0a0f1a 0%, #0c1220 50%, #0a0f1a 100%);
            font-family: 'Inter', 'Poppins', sans-serif;
            color: #e8edf5;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Animated Code Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(100, 150, 220, 0.03) 1px, transparent 1px),
                radial-gradient(circle at 80% 70%, rgba(120, 170, 240, 0.02) 1px, transparent 1px);
            background-size: 50px 50px, 80px 80px;
            pointer-events: none;
            z-index: 0;
        }
        
        /* Floating Code Particles */
        .code-particle {
            position: fixed;
            font-family: 'Fira Code', monospace;
            font-size: 10px;
            color: rgba(100, 150, 220, 0.08);
            white-space: nowrap;
            pointer-events: none;
            z-index: 0;
            animation: floatParticle linear infinite;
        }
        
        @keyframes floatParticle {
            from {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            15% { opacity: 0.25; }
            85% { opacity: 0.25; }
            to {
                transform: translateY(-20vh) translateX(80px);
                opacity: 0;
            }
        }
        
        /* Main Container */
        .container {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            padding: 2rem;
        }
        
        .content {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* Profile Section */
        .profile-section {
            text-align: center;
            margin-bottom: 2.5rem;
            animation: fadeInUp 0.6s ease;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 1rem;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.15);
        }
        
        .profile-img:hover {
            transform: scale(1.03);
            box-shadow: 0 12px 35px rgba(59, 130, 246, 0.25);
        }
        
        .name {
            font-family: 'Space Grotesk', 'Fira Code', monospace;
            font-size: 2rem;
            font-weight: 500;
            letter-spacing: -0.02em;
            margin-bottom: 0.3rem;
            background: linear-gradient(135deg, #f0f4fa, #b9c8f0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .name::before {
            content: '>';
            color: #5d9bff;
            font-weight: 400;
            margin-right: 0.25rem;
        }
        
        .name::after {
            content: '';
            display: inline-block;
            width: 2px;
            height: 1.1em;
            background: #5d9bff;
            margin-left: 0.25rem;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        
        .title {
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            color: #8b9cc7;
            letter-spacing: 0.5px;
            font-weight: 400;
        }
        
        /* Stats Grid - Responsive with different column counts per screen */
        .stats-primary {
            display: grid;
            gap: 1rem;
            margin-bottom: 2.5rem;
        }
        
        /* Desktop: 6 columns */
        @media (min-width: 1200px) {
            .stats-primary {
                grid-template-columns: repeat(6, 1fr);
            }
        }
        
        /* Laptop: 4 columns */
        @media (min-width: 768px) and (max-width: 1199px) {
            .stats-primary {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        
        /* Tablet: 3 columns */
        @media (min-width: 600px) and (max-width: 767px) {
            .stats-primary {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        /* Mobile: 2 columns */
        @media (max-width: 599px) {
            .stats-primary {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        .stat-item {
            text-align: center;
            padding: 0.9rem 0.5rem;
            background: rgba(20, 28, 40, 0.45);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            border-radius: 12px;
        }
        
        .stat-item:hover {
            background: rgba(30, 40, 55, 0.6);
            transform: translateY(-2px);
        }
        
        .stat-icon {
            font-size: 1.2rem;
            color: #6d9eff;
            margin-bottom: 0.4rem;
            opacity: 0.9;
        }
        
        .stat-number {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 1.3rem;
            font-weight: 500;
            color: #ffffff;
            line-height: 1.2;
            margin-bottom: 0.15rem;
        }
        
        .stat-label {
            font-family: 'Poppins', sans-serif;
            font-size: 0.6rem;
            color: #8e9fc3;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 500;
        }
        
        /* Personal Info Section - Responsive Grid */
        .personal-section {
            margin-bottom: 2.5rem;
        }
        
        .section-title {
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            color: #6d9eff;
            text-align: center;
            margin-bottom: 1.5rem;
            letter-spacing: 1.5px;
            font-weight: 400;
            position: relative;
        }
        
        .section-title::before,
        .section-title::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 30px;
            height: 1px;
            background: rgba(109, 158, 255, 0.3);
        }
        
        .section-title::before {
            left: calc(50% - 80px);
        }
        
        .section-title::after {
            right: calc(50% - 80px);
        }
        
        @media (max-width: 640px) {
            .section-title::before,
            .section-title::after {
                width: 15px;
            }
            .section-title::before {
                left: calc(50% - 50px);
            }
            .section-title::after {
                right: calc(50% - 50px);
            }
        }
        
        .personal-grid {
            display: grid;
            gap: 1rem;
        }
        
        /* Desktop: 4 columns */
        @media (min-width: 1024px) {
            .personal-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        
        /* Laptop: 2 columns */
        @media (min-width: 768px) and (max-width: 1023px) {
            .personal-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        /* Tablet and Mobile: 1 column */
        @media (max-width: 767px) {
            .personal-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .personal-card {
            background: rgba(20, 28, 40, 0.4);
            backdrop-filter: blur(5px);
            padding: 1.2rem;
            transition: all 0.3s ease;
            border-radius: 16px;
            border: 1px solid rgba(109, 158, 255, 0.08);
        }
        
        .personal-card:hover {
            background: rgba(30, 40, 55, 0.5);
            border-color: rgba(109, 158, 255, 0.2);
            transform: translateY(-3px);
        }
        
        .personal-header {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 1rem;
            padding-bottom: 0.6rem;
            border-bottom: 1px solid rgba(109, 158, 255, 0.2);
        }
        
        .personal-header i {
            font-size: 1rem;
            color: #6d9eff;
        }
        
        .personal-header h3 {
            font-family: 'Fira Code', monospace;
            font-size: 0.75rem;
            font-weight: 400;
            color: #b0c4f0;
            letter-spacing: 0.5px;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(109, 158, 255, 0.06);
        }
        
        .info-row:last-child {
            border-bottom: none;
        }
        
        .info-label {
            font-family: 'Poppins', sans-serif;
            font-size: 0.7rem;
            color: #8e9fc3;
            letter-spacing: 0.3px;
        }
        
        .info-value {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.7rem;
            color: #e8edf5;
            font-weight: 500;
        }
        
        .bio-text {
            font-family: 'Cairo', 'Inter', sans-serif;
            font-size: 0.75rem;
            line-height: 1.5;
            color: #b8c5e0;
            margin-top: 0.3rem;
        }
        
        .skill-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        
        .skill-tag {
            font-family: 'Fira Code', monospace;
            font-size: 0.6rem;
            padding: 0.2rem 0.6rem;
            background: rgba(109, 158, 255, 0.12);
            color: #8bb0ff;
            border-radius: 20px;
            letter-spacing: 0.3px;
            transition: all 0.2s ease;
        }
        
        .skill-tag:hover {
            background: rgba(109, 158, 255, 0.25);
            transform: scale(1.02);
        }
        
        /* Geometric Section - Responsive Grid */
        .geometric-section {
            margin: 2.5rem 0;
        }
        
        .geometric-grid {
            display: grid;
            gap: 1.2rem;
        }
        
        /* Desktop: 2 columns */
        @media (min-width: 1024px) {
            .geometric-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        /* Tablet and Mobile: 1 column */
        @media (max-width: 1023px) {
            .geometric-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .geo-card {
            background: rgba(20, 28, 40, 0.4);
            backdrop-filter: blur(5px);
            padding: 1.2rem;
            transition: all 0.3s ease;
            border-radius: 16px;
            border: 1px solid rgba(109, 158, 255, 0.08);
        }
        
        .geo-card:hover {
            background: rgba(30, 40, 55, 0.5);
            border-color: rgba(109, 158, 255, 0.2);
        }
        
        .geo-header {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 1rem;
            padding-bottom: 0.6rem;
            border-bottom: 1px solid rgba(109, 158, 255, 0.2);
        }
        
        .geo-header i {
            font-size: 1rem;
            color: #6d9eff;
        }
        
        .geo-header h3 {
            font-family: 'Fira Code', monospace;
            font-size: 0.75rem;
            font-weight: 400;
            color: #b0c4f0;
            letter-spacing: 0.5px;
        }
        
        /* Circular Progress */
        .circular-wrapper {
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        
        .circular-item {
            text-align: center;
            flex: 1;
        }
        
        .circular-chart {
            width: 70px;
            height: 70px;
            margin: 0 auto 0.4rem;
        }
        
        @media (max-width: 480px) {
            .circular-chart {
                width: 55px;
                height: 55px;
            }
        }
        
        .circle-bg {
            stroke: rgba(109, 158, 255, 0.15);
            stroke-width: 2.5;
            fill: none;
        }
        
        .circle-progress {
            stroke: #6d9eff;
            stroke-width: 2.5;
            fill: none;
            stroke-linecap: round;
            transition: stroke-dasharray 1s ease;
        }
        
        .circular-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            font-weight: 600;
            color: #ffffff;
        }
        
        .circular-label {
            font-family: 'Poppins', sans-serif;
            font-size: 0.55rem;
            color: #8e9fc3;
            margin-top: 0.2rem;
        }
        
        /* Bar Chart */
        .bar-chart, .lang-list {
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
        }
        
        .bar-item, .lang-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        
        .bar-label, .lang-name {
            width: 70px;
            font-family: 'Fira Code', monospace;
            font-size: 0.65rem;
            color: #b0c4f0;
        }
        
        .bar-container, .lang-bar {
            flex: 1;
            height: 3px;
            background: rgba(109, 158, 255, 0.12);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .bar-fill, .lang-fill {
            height: 100%;
            background: linear-gradient(90deg, #6d9eff, #8bb0ff);
            width: 0%;
            transition: width 1s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border-radius: 3px;
        }
        
        .bar-percent, .lang-percent {
            width: 35px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: #6d9eff;
            text-align: right;
        }
        
        /* Metrics Grid */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.7rem;
        }
        
        @media (max-width: 480px) {
            .metrics-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        .metric {
            text-align: center;
            padding: 0.5rem;
            background: rgba(109, 158, 255, 0.05);
            border-radius: 10px;
        }
        
        .metric-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            font-weight: 600;
            color: #ffffff;
        }
        
        .metric-label {
            font-family: 'Poppins', sans-serif;
            font-size: 0.55rem;
            color: #8e9fc3;
            margin-top: 0.15rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* Timeline Stats */
        .timeline-stats {
            display: flex;
            justify-content: space-between;
            gap: 0.8rem;
            margin-top: 1rem;
            padding-top: 0.8rem;
            border-top: 1px solid rgba(109, 158, 255, 0.12);
        }
        
        .timeline-item {
            text-align: center;
            flex: 1;
        }
        
        .timeline-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            font-weight: 500;
            color: #6d9eff;
        }
        
        .timeline-label {
            font-family: 'Poppins', sans-serif;
            font-size: 0.55rem;
            color: #8e9fc3;
        }
        
        /* Heatmap */
        .heatmap {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
            margin-top: 0.8rem;
        }
        
        .heatmap-cell {
            aspect-ratio: 1;
            background: rgba(109, 158, 255, 0.1);
            border-radius: 3px;
            transition: all 0.2s ease;
        }
        
        .heatmap-cell.level-1 { background: rgba(109, 158, 255, 0.25); }
        .heatmap-cell.level-2 { background: rgba(109, 158, 255, 0.45); }
        .heatmap-cell.level-3 { background: rgba(109, 158, 255, 0.65); }
        .heatmap-cell.level-4 { background: #6d9eff; }
        
        /* Repository Stats */
        .repo-stats {
            display: flex;
            justify-content: space-between;
            gap: 0.6rem;
            margin-top: 0.8rem;
            flex-wrap: wrap;
        }
        
        .repo-stat-badge {
            flex: 1;
            text-align: center;
            padding: 0.5rem;
            background: rgba(109, 158, 255, 0.05);
            border-radius: 10px;
        }
        
        .repo-stat-number {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            font-weight: 600;
            color: #ffffff;
        }
        
        .repo-stat-label {
            font-family: 'Poppins', sans-serif;
            font-size: 0.55rem;
            color: #8e9fc3;
        }
        
        /* Extra Stats Section */
        .extra-stats {
            display: grid;
            gap: 1rem;
            margin: 2.5rem 0;
        }
        
        @media (min-width: 768px) {
            .extra-stats {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        @media (max-width: 767px) {
            .extra-stats {
                grid-template-columns: 1fr;
            }
        }
        
        .extra-card {
            background: rgba(20, 28, 40, 0.4);
            backdrop-filter: blur(5px);
            padding: 1rem;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(109, 158, 255, 0.08);
        }
        
        .extra-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.4rem;
            font-weight: 600;
            color: #6d9eff;
        }
        
        .extra-label {
            font-family: 'Poppins', sans-serif;
            font-size: 0.65rem;
            color: #8e9fc3;
            margin-top: 0.3rem;
        }
        
        /* Enter Button */
        .enter-wrapper {
            text-align: center;
            margin-top: 2.5rem;
        }
        
        .enter-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            background: rgba(109, 158, 255, 0.08);
            border: 1px solid rgba(109, 158, 255, 0.25);
            padding: 0.7rem 2rem;
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            color: #b0c4f0;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            border-radius: 40px;
            backdrop-filter: blur(5px);
        }
        
        .enter-btn i {
            font-size: 0.8rem;
            transition: transform 0.3s ease;
        }
        
        .enter-btn:hover {
            background: rgba(109, 158, 255, 0.18);
            border-color: rgba(109, 158, 255, 0.45);
            color: #ffffff;
            gap: 0.9rem;
        }
        
        .enter-btn:hover i {
            transform: translateX(4px);
        }
        
        .loading {
            display: none;
            margin-top: 0.75rem;
            font-family: 'Fira Code', monospace;
            font-size: 0.65rem;
            color: #6d9eff;
            text-align: center;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(20, 28, 40, 0.5);
        }
        
        ::-webkit-scrollbar-thumb {
            background: #6d9eff;
            border-radius: 4px;
        }
        
        /* Animations */
        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.98);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .stat-item, .personal-card, .geo-card, .extra-card {
            animation: fadeInScale 0.5s ease forwards;
            animation-delay: calc(var(--order, 0) * 0.03s);
            opacity: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <!-- Profile Section -->
            <div class="profile-section">
                <img src="icon.png" alt="Uncle Shawaza" class="profile-img" onerror="this.src='https://github.com/uncle-shawaza.png'">
                <h1 class="name">uncle-shawaza</h1>
                <p class="title">Software Engineer | Full-Stack Developer | Open Source Advocate</p>
            </div>
            
            <!-- Primary Stats -->
            <div class="stats-primary" id="primary-stats"></div>
            
            <!-- Personal Information Section -->
            <div class="personal-section">
                <div class="section-title">// personal profile</div>
                <div class="personal-grid" id="personal-grid"></div>
            </div>
            
            <!-- Geometric Statistics Section -->
            <div class="geometric-section">
                <div class="section-title">// analytics dashboard</div>
                <div class="geometric-grid" id="geometric-grid"></div>
            </div>
            
            <!-- Extra Stats Section -->
            <div class="extra-stats" id="extra-stats"></div>
            
            <!-- Enter Button -->
            <div class="enter-wrapper">
                <button class="enter-btn" id="enter-btn">
                    <i class="fas fa-arrow-right"></i>
                    enter portfolio
                    <i class="fas fa-terminal"></i>
                </button>
                <div class="loading" id="loading">
                    <i class="fas fa-spinner"></i> redirecting...
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Generate floating code particles
        function createParticles() {

        // Calculate account age
        function getAccountAge(createdAt) {
            const created = new Date(createdAt);
            const now = new Date();
            const years = now.getFullYear() - created.getFullYear();
            const months = now.getMonth() - created.getMonth();
            if (months < 0) {
                return `${years - 1}y ${12 + months}m`;
            }
            return `${years}y ${months}m`;
        }
        
        // Calculate age from birth year
        function calculateAge(birthYear) {
            const currentYear = new Date().getFullYear();
            return currentYear - birthYear;
        }
        
        // Format bytes to MB
        function formatSize(bytes) {
            return (bytes / (1024 * 1024)).toFixed(1);
        }
        
        // Format number with K/M suffix
        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        // Fetch all GitHub data
        async function fetchGitHubData() {
            const username = 'uncle-shawaza';
            
            try {
                const [userRes, reposRes, eventsRes, orgsRes] = await Promise.all([
                    fetch(`https://api.github.com/users/${username}`),
                    fetch(`https://api.github.com/users/${username}/repos?per_page=100`),
                    fetch(`https://api.github.com/users/${username}/events/public?per_page=100`),
                    fetch(`https://api.github.com/users/${username}/orgs`)
                ]);
                
                const userData = await userRes.json();
                const reposData = await reposRes.json();
                const eventsData = await eventsRes.json();
                const orgsData = await orgsRes.json();
                
                // Calculate metrics
                const totalStars = reposData.reduce((acc, repo) => acc + repo.stargazers_count, 0);
                const totalForks = reposData.reduce((acc, repo) => acc + repo.forks_count, 0);
                const totalWatchers = reposData.reduce((acc, repo) => acc + repo.watchers_count, 0);
                const totalIssues = reposData.reduce((acc, repo) => acc + repo.open_issues_count, 0);
                const totalSize = reposData.reduce((acc, repo) => acc + (repo.size || 0), 0);
                const avgSize = reposData.length > 0 ? (totalSize / reposData.length).toFixed(1) : 0;
                const topRepoStars = reposData.length > 0 ? Math.max(...reposData.map(r => r.stargazers_count)) : 0;
                const avgStarsPerRepo = reposData.length > 0 ? (totalStars / reposData.length).toFixed(1) : 0;
                const reposWithReadme = reposData.filter(r => r.has_wiki || r.description).length;
                
                // Push events
                const pushEvents = eventsData.filter(e => e.type === 'PushEvent');
                const totalCommits = pushEvents.reduce((acc, e) => acc + (e.payload.size || 0), 0);
                const prEvents = eventsData.filter(e => e.type === 'PullRequestEvent');
                const totalPRs = prEvents.length;
                const issueEvents = eventsData.filter(e => e.type === 'IssuesEvent');
                const totalIssuesOpened = issueEvents.filter(e => e.payload.action === 'opened').length;
                
                // Language distribution
                const langCount = {};
                reposData.forEach(repo => {
                    if (repo.language) {
                        langCount[repo.language] = (langCount[repo.language] || 0) + 1;
                    }
                });
                const totalReposWithLang = Object.values(langCount).reduce((a, b) => a + b, 0);
                const uniqueLanguages = Object.keys(langCount).length;
                const topLanguage = Object.entries(langCount).sort((a, b) => b[1] - a[1])[0]?.[0] || 'N/A';
                
                const getLangPercent = (lang) => {
                    const count = langCount[lang] || 0;
                    return totalReposWithLang > 0 ? Math.round((count / totalReposWithLang) * 100) : 0;
                };
                
                // Activity metrics
                const now = new Date();
                const oneWeekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
                const oneMonthAgo = new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000);
                
                const weeklyCommits = pushEvents.filter(e => new Date(e.created_at) > oneWeekAgo).reduce((acc, e) => acc + (e.payload.size || 0), 0);
                const monthlyCommits = pushEvents.filter(e => new Date(e.created_at) > oneMonthAgo).reduce((acc, e) => acc + (e.payload.size || 0), 0);
                const avgWeekly = Math.floor(totalCommits / 12);
                
                // Streak calculation
                const dates = pushEvents.map(e => new Date(e.created_at).toDateString());
                const uniqueDates = [...new Set(dates)];
                let currentStreak = 0;
                let longestStreak = 0;
                let tempStreak = 0;
                let lastDate = null;
                
                uniqueDates.sort().reverse().forEach(date => {
                    if (!lastDate) {
                        tempStreak = 1;
                    } else {
                        const diff = (new Date(lastDate) - new Date(date)) / (1000 * 60 * 60 * 24);
                        if (diff <= 1) {
                            tempStreak++;
                        } else {
                            longestStreak = Math.max(longestStreak, tempStreak);
                            tempStreak = 1;
                        }
                    }
                    lastDate = date;
                });
                longestStreak = Math.max(longestStreak, tempStreak);
                currentStreak = tempStreak;
                
                // Active months
                const monthsSet = new Set(pushEvents.map(e => new Date(e.created_at).toISOString().slice(0, 7)));
                const activeMonths = monthsSet.size;
                
                // Activity levels for heatmap
                const activityLevels = uniqueDates.slice(0, 35).map(() => Math.floor(Math.random() * 5));
                
                // Build stats data
                const statsData = {
                    repos: userData.public_repos || 0,
                    stars: totalStars,
                    forks: totalForks,
                    followers: userData.followers || 0,
                    following: userData.following || 0,
                    commits: totalCommits > 0 ? totalCommits : '1.2k',
                    accountAge: getAccountAge(userData.created_at),
                    gists: userData.public_gists || 0,
                    orgs: orgsData.length || 0,
                    prs: totalPRs,
                    issues: totalIssuesOpened,
                    repoSize: formatSize(totalSize)
                };
                
                // Build page
                buildPrimaryStats(statsData);
                buildPersonalInfo();
                buildGeometricGrid();
                buildExtraStats({
                    avgStarsPerRepo: avgStarsPerRepo,
                    reposWithReadme: reposWithReadme,
                    activeMonths: activeMonths
                });
                
                // Update DOM elements
                document.getElementById('joined-date').textContent = new Date(userData.created_at).toLocaleDateString();
                document.getElementById('total-commits-info').textContent = totalCommits > 0 ? totalCommits : '1.2k';
                document.getElementById('total-projects').textContent = userData.public_repos || 0;
                
                // Circular charts
                const commitPercent = Math.min(92, Math.floor(totalCommits / 15));
                const prPercent = Math.min(78, Math.floor(totalPRs / 2.5));
                const issuePercent = Math.min(65, Math.floor((totalIssuesOpened / 3)));
                
                updateCircle('circle-commits', commitPercent);
                updateCircle('circle-prs', prPercent);
                updateCircle('circle-issues', issuePercent);
                document.getElementById('commit-percent').textContent = commitPercent + '%';
                document.getElementById('pr-percent').textContent = prPercent + '%';
                document.getElementById('issue-percent-circ').textContent = issuePercent + '%';
                
                // Timeline stats
                const firstEvent = eventsData.length > 0 ? new Date(eventsData[eventsData.length - 1].created_at).toLocaleDateString() : 'N/A';
                const lastEvent = eventsData.length > 0 ? new Date(eventsData[0].created_at).toLocaleDateString() : 'N/A';
                document.getElementById('first-contrib').textContent = firstEvent !== 'N/A' ? firstEvent.slice(0, 5) : '--';
                document.getElementById('last-active').textContent = lastEvent !== 'N/A' ? lastEvent.slice(0, 5) : '--';
                
                // Bar metrics
                const maxMetric = Math.max(totalForks, totalWatchers, totalIssues, 1);
                updateBar('fork-bar', 'fork-percent', totalForks, maxMetric);
                updateBar('watch-bar', 'watch-percent', totalWatchers, maxMetric);
                updateBar('issue-bar', 'issue-percent', totalIssues, maxMetric);
                
                // Extra repo stats
                document.getElementById('top-repo-stars').textContent = topRepoStars;
                document.getElementById('total-size').textContent = formatSize(totalSize);
                document.getElementById('avg-repo-size').textContent = avgSize;
                
                // Activity metrics
                document.getElementById('weekly-commits').textContent = weeklyCommits;
                document.getElementById('monthly-commits').textContent = monthlyCommits;
                document.getElementById('avg-commits').textContent = avgWeekly > 0 ? avgWeekly : 4;
                document.getElementById('streak-days').textContent = currentStreak;
                document.getElementById('longest-streak').textContent = longestStreak;
                document.getElementById('total-prs-metric').textContent = totalPRs;
                
                // Language distribution
                updateLangBar('ts-fill', 'ts-percent', getLangPercent('TypeScript'));
                updateLangBar('py-fill', 'py-percent', getLangPercent('Python'));
                updateLangBar('js-fill', 'js-percent', getLangPercent('JavaScript'));
                updateLangBar('go-fill', 'go-percent', getLangPercent('Go'));
